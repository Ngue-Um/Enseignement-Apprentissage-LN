  <template id="tpl-apropos">
    <section class="prose prose-ink max-w-3xl">
      <h1 class="font-serif text-3xl">À propos de ce prototype</h1>
      <p>
        Ce prototype est un livrable du cours <strong>LACC2342 — Outils pour la production du matériel didactique numérique
        et multimédia en langues camerounaises</strong> dispensé à l'École Normale Supérieure de Yaoundé par
        le <strong>Prof. Emmanuel Ngue Um</strong> aux élèves-professeurs de Niveau 2.
      </p>
      <p>
        Il démontre, à partir des ressources <strong>ALCAM</strong> publiées sur la plateforme
        <a href="https://mozilladatacollective.com/organization/cmfv3ichk000amd07piai0zoz" target="_blank" rel="noopener">Mozilla Data Collective</a>
        sous la bannière de l'<strong>Institut des Humanités numériques africaines</strong>,
        comment articuler audio, transcription en Alphabet général des langues camerounaises (AGLC) et traduction française
        au service de l'enseignement secondaire des langues nationales (programmes MINESEC, classes de 6<sup>e</sup>, 5<sup>e</sup>, 4<sup>e</sup>, 3<sup>e</sup>).
      </p>
      <h2 class="font-serif text-2xl mt-8">Portée pédagogique</h2>
      <ul>
        <li><strong>Cadrage</strong> : approche par compétences et entrée par les situations de vie (MINESEC, 2014).</li>
        <li><strong>Données</strong> : 152 phrases bulu avec audio MP3 et traduction française appariée (sur 184 audios totaux).</li>
        <li><strong>Modules MINESEC ciblés</strong> : II (segmentaux), III (suprasegmentaux), IV (syntagme nominal), V (syntagme verbal), VI (phrase).</li>
      </ul>
      <h2 class="font-serif text-2xl mt-8">Étendre à une autre langue</h2>
      <p>
        Pour ajouter une langue ALCAM, il suffit de fournir un fichier <code>data/&lt;langue&gt;.json</code>
        au même format que <code>data/bulu.json</code>, et de déposer les MP3 dans <code>audio/&lt;langue&gt;/</code>.
        Le script <code>build_data.py</code> est fourni à titre d'exemple. La marche à suivre détaillée se trouve
        dans le <code>README.md</code> du dépôt.
      </p>
      <h2 class="font-serif text-2xl mt-8">Crédits & licence</h2>
      <p>
        Données ALCAM : Institut des Humanités numériques africaines, publiées sur Mozilla Data Collective.
        Code de l'application : licence MIT. Données et audios : licence CC-BY (attribuer aux locuteurs et au dépositaire).
      </p>
      <p class="text-sm text-ink-500 mt-8">
        Ce prototype a été réalisé en avril 2026 dans le cadre du semestre 2 de l'année universitaire 2025-2026.
      </p>
    </section>
